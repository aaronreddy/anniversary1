<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy 1 Year Anniversary ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="hearts"></div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div id="startScreen" class="card">
    <div class="gold-line"></div>
    <h1>Happy 1 Year Anniversary</h1>
    <h2>Dushakya ❤️</h2>
    <p>One year of love, laughter, and unforgettable memories.</p>
    <button id="startBtn">Begin Our Story ✨</button>
  </div>

  <div id="presentation" class="card hidden fade-in">
    <img id="slideImage" src="" alt="Slide">
    <div class="controls">
      <button id="prevBtn">⬅ Previous</button>
      <span id="slideCounter"></span>
      <button id="nextBtn">Next ➡</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
